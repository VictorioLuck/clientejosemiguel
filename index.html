<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Tour Monagas</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --azul-oceano: #0056b3;
            --azul-profundo: #003d80;
            --naranja-atardecer: #f39237;
            --naranja-calido: #e67e22;
            --arena-clara: #fdfaf5;
            --arena-oscura: #f5e6d3;
            --verde-ws: #25d366;
            --texto-oscuro: #2c3e50;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, var(--azul-oceano), var(--azul-profundo));
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 10px;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
        }

        h1, h2, h3, .brand-text { font-family: 'Montserrat', sans-serif; font-weight: 700; }

        .portal-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 900px;
            padding: 10px;
        }

        .portal-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeInUp 0.8s ease;
            width: 100%;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .portal-header {
            background: linear-gradient(135deg, var(--azul-oceano), var(--naranja-atardecer));
            padding: 30px 20px;
            text-align: center;
            color: white;
            position: relative;
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .portal-header h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .portal-header p {
            opacity: 0.9;
            font-size: 1rem;
            margin: 0;
        }

        .portal-body {
            padding: 25px 15px;
        }

        /* Botón Cliente Principal */
        .btn-cliente-main {
            width: 100%;
            padding: 20px 30px;
            background: linear-gradient(135deg, var(--verde-ws), #128c7e);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 25px rgba(37,211,102,0.3);
            text-decoration: none;
            margin-bottom: 20px;
        }

        .btn-cliente-main:hover,
        .btn-cliente-main:active {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(37,211,102,0.4);
            color: white;
        }

        .btn-cliente-main i {
            font-size: 1.3rem;
        }

        /* Toggle Administrador */
        .admin-toggle {
            width: 100%;
            padding: 15px 20px;
            background: transparent;
            color: var(--azul-oceano);
            border: 2px solid var(--azul-oceano);
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .admin-toggle:hover,
        .admin-toggle:active {
            background: var(--azul-oceano);
            color: white;
        }

        .admin-toggle i {
            transition: transform 0.3s ease;
        }

        .admin-toggle[aria-expanded="true"] i {
            transform: rotate(180deg);
        }

        /* Formulario Admin Colapsable */
        .admin-collapse {
            margin-top: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            overflow: hidden;
            background: white;
        }

        .admin-form {
            padding: 25px 20px;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .admin-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--azul-oceano), var(--azul-profundo));
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 1.3rem;
        }

        .admin-header h3 {
            color: var(--texto-oscuro);
            font-size: 1.1rem;
            margin: 0;
        }

        .admin-header p {
            color: #666;
            font-size: 0.85rem;
            margin: 5px 0 0;
        }

        .password-input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .password-input-group input {
            width: 100%;
            padding: 14px 45px 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .password-input-group input:focus {
            outline: none;
            border-color: var(--azul-oceano);
            box-shadow: 0 0 0 4px rgba(0,86,179,0.1);
        }

        .password-input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            cursor: pointer;
            transition: color 0.3s;
            padding: 10px;
        }

        .password-input-group i:hover {
            color: var(--azul-oceano);
        }

        .btn-admin-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--azul-oceano), var(--azul-profundo));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-admin-login:hover,
        .btn-admin-login:active {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,86,179,0.3);
        }

        .error-msg {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
            align-items: center;
            gap: 5px;
            justify-content: center;
        }

        .error-msg.show {
            display: flex;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider::before {
            margin-right: 10px;
        }

        .divider::after {
            margin-left: 10px;
        }

        /* Footer del portal */
        .portal-footer {
            text-align: center;
            margin-top: 25px;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            padding: 0 10px;
        }

        .portal-footer a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .portal-footer a:hover {
            text-decoration: underline;
        }

        /* ===== TABLET (768px y superior) ===== */
        @media (min-width: 768px) {
            html {
                font-size: 17px;
            }

            body {
                padding: 20px;
            }

            .portal-container {
                padding: 20px;
            }

            .portal-card {
                border-radius: 24px;
            }

            .portal-header {
                padding: 40px 30px;
            }

            .brand-icon {
                width: 80px;
                height: 80px;
                font-size: 2.2rem;
                margin-bottom: 20px;
            }

            .portal-header h1 {
                font-size: 2rem;
            }

            .portal-header p {
                font-size: 1.1rem;
            }

            .portal-body {
                padding: 35px 25px;
            }

            .btn-cliente-main {
                padding: 22px 35px;
                font-size: 1.2rem;
                margin-bottom: 25px;
            }

            .admin-toggle {
                padding: 18px 25px;
                font-size: 1rem;
            }

            .admin-form {
                padding: 30px;
            }

            .admin-icon {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }

            .admin-header h3 {
                font-size: 1.2rem;
            }

            .admin-header p {
                font-size: 0.9rem;
            }

            .portal-footer {
                font-size: 0.85rem;
                margin-top: 30px;
            }
        }

        /* ===== LAPTOPS Y ESCRITORIOS (992px y superior) ===== */
        @media (min-width: 992px) {
            html {
                font-size: 18px;
            }

            .portal-container {
                max-width: 500px;
            }
        }

        /* ===== MÓVILES PEQUEÑOS (375px e inferior) ===== */
        @media (max-width: 375px) {
            html {
                font-size: 14px;
            }

            .portal-header {
                padding: 25px 15px;
            }

            .brand-icon {
                width: 55px;
                height: 55px;
                font-size: 1.6rem;
            }

            .btn-cliente-main {
                padding: 16px 20px;
                font-size: 1rem;
            }

            .admin-form {
                padding: 20px 15px;
            }
        }

        /* ===== ORIENTACIÓN HORIZONTAL EN MÓVILES ===== */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                align-items: flex-start;
                padding-top: 20px;
                padding-bottom: 20px;
            }

            .portal-container {
                padding: 10px;
            }

            .portal-header {
                padding: 20px;
            }

            .brand-icon {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
                margin-bottom: 10px;
            }

            .portal-header h1 {
                font-size: 1.4rem;
            }

            .portal-body {
                padding: 20px;
            }
        }

        /* Reducir animaciones si el usuario lo prefiere */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    
        .brand-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        @media (min-width: 400px) {
            .brand-logo {
                width: 300px;
                height: 300px;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 375px) {
            .brand-logo {
                width: 90px;
                height: 90px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .brand-logo {
                width: 80px;
                height: 80px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="portal-card">
            <div class="portal-header">
                <div class="brand-logo">
                    <img src="logo.png" alt="Family Tour Monagas Logo">
                </div>
                <h1>Tu próxima gran historia te espera.</h1>
            </div>

            <div class="portal-body">
                <!-- Botón Cliente Principal -->
                <a href="cliente.html" class="btn-cliente-main">
                    <i class="fas fa-users"></i>
                    Entrar como Cliente
                </a>

                <!-- Separador -->
                <div class="divider">o</div>

                <!-- Toggle Administrador -->
                <button class="admin-toggle" type="button" data-bs-toggle="collapse" data-bs-target="#adminCollapse" aria-expanded="false" aria-controls="adminCollapse">
                    <i class="fas fa-shield-alt"></i>
                    Acceso Administrador
                    <i class="fas fa-chevron-down"></i>
                </button>

                <!-- Formulario Admin Colapsable -->
                <div class="collapse admin-collapse" id="adminCollapse">
                    <div class="admin-form">
                        <div class="admin-header">
                            <div class="admin-icon">
                                <i class="fas fa-cog"></i>
                            </div>
                            <h3>Panel de Administración</h3>
                            <p>Ingresa tu contraseña para continuar</p>
                        </div>

                        <div class="password-input-group">
                            <input type="password" id="adminPassword" placeholder="Contraseña de administrador" onkeypress="handleKeypress(event)">
                            <i class="fas fa-eye" onclick="togglePassword()" id="toggleIcon"></i>
                        </div>

                        <div class="error-msg" id="errorMsg">
                            <i class="fas fa-exclamation-circle"></i>
                            <span>Contraseña incorrecta. Inténtalo de nuevo.</span>
                        </div>

                        <button class="btn-admin-login" onclick="verifyPassword()">
                            <i class="fas fa-unlock"></i> Verificar Acceso
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="portal-footer">
            <p>&copy; 2026 Family Tour Monagas. Todos los derechos reservados.</p>
            <p style="margin-top: 5px; font-size: 0.75rem; opacity: 0.8;">
                <i class="fas fa-shield-alt me-1"></i>Acceso seguro protegido
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const ADMIN_PASSWORD = '56890709';

        function togglePassword() {
            const input = document.getElementById('adminPassword');
            const icon = document.getElementById('toggleIcon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function handleKeypress(event) {
            if (event.key === 'Enter') {
                verifyPassword();
            }
        }

        function verifyPassword() {
            const input = document.getElementById('adminPassword');
            const errorMsg = document.getElementById('errorMsg');
            
            if (input.value === ADMIN_PASSWORD) {
                input.style.borderColor = '#28a745';
                input.style.background = '#f8fff9';
                
                setTimeout(() => {
                    window.location.href = 'administrador.html';
                }, 500);
            } else {
                errorMsg.classList.add('show');
                input.style.borderColor = '#dc3545';
                input.value = '';
                input.focus();
                
                setTimeout(() => {
                    input.style.borderColor = '#e0e0e0';
                    input.style.background = 'white';
                    errorMsg.classList.remove('show');
                }, 3000);
            }
        }
    </script>
</body>
</html>
